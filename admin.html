<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DOMZOR Admin</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script defer src="supabase-config.js"></script><script defer src="admin.js"></script></head><body><main class="admin-shell"><div class="admin-nav"><img src="domzor-logo.svg" alt="DOMZOR" style="width:180px"><a href="index.html">Back to website</a></div><section class="admin-login" id="admin-login"><h1>DOMZOR Admin</h1><p>Sign in with the administrator email configured in Supabase.</p><form id="login-form" class="community-form"><label class="full">Email<input type="email" name="email" required></label><label class="full">Password<input type="password" name="password" required></label><button class="btn btn-primary" type="submit">Sign in</button><p id="login-status" class="form-status"></p></form></section><section class="admin-panel" id="admin-panel" hidden><div class="admin-nav"><div><h1>Pending submissions</h1><p>Approve, reject, reply, or delete.</p></div><button id="logout" class="btn btn-outline">Sign out</button></div><div id="admin-list" class="admin-grid"></div></section></main></body></html>
