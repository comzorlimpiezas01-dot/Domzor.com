<!doctype html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1" name="viewport"/>
  <title data-en="DOMZOR Admin" data-es="Administraci&oacute;n de DOMZOR">
   DOMZOR Admin
  </title>
  <link href="style.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <script defer="" src="supabase-config.js">
  </script>
  <script defer="" src="admin.js">
  </script>
  <link href="bilingual.css" rel="stylesheet"/>
  <script defer="True" src="bilingual.js">
  </script>
 </head>
 <body>
  <main class="admin-shell">
   <div class="admin-nav">
    <img alt="DOMZOR" src="domzor-logo.svg" style="width:180px"/>
    <a data-en="Back to website" data-es="Volver al sitio web" href="index.html">
     Back to website
    </a>
   </div>
   <section class="admin-login" id="admin-login">
    <h1 data-en="DOMZOR Admin" data-es="Administraci&oacute;n de DOMZOR">
     DOMZOR Admin
    </h1>
    <p data-en="Sign in with the administrator email configured in Supabase." data-es="Inicia sesi&oacute;n con el correo de administrador configurado en Supabase.">
     Sign in with the administrator email configured in Supabase.
    </p>
    <form class="community-form" id="login-form">
     <label class="full">
      <span data-en="Email" data-es="Correo electr&oacute;nico">
       Email
      </span>
      <input name="email" required="" type="email"/>
     </label>
     <label class="full">
      <span data-en="Password" data-es="Contrase&ntilde;a">
       Password
      </span>
      <input name="password" required="" type="password"/>
     </label>
     <button class="btn btn-primary" data-en="Sign in" data-es="Iniciar sesi&oacute;n" type="submit">
      Sign in
     </button>
     <p class="form-status" id="login-status">
     </p>
    </form>
   </section>
   <section class="admin-panel" hidden="" id="admin-panel">
    <div class="admin-nav">
     <div>
      <h1 data-en="Pending submissions" data-es="Env&iacute;os pendientes">
       Pending submissions
      </h1>
      <p data-en="Approve, reject, reply, or delete." data-es="Aprueba, rechaza, responde o elimina.">
       Approve, reject, reply, or delete.
      </p>
     </div>
     <button class="btn btn-outline" data-en="Sign out" data-es="Cerrar sesi&oacute;n" id="logout">
      Sign out
     </button>
    </div>
    <div class="admin-grid" id="admin-list">
    </div>
   </section>
  </main>
 </body>
</html>
